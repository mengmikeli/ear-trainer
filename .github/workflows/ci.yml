name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Note: svelte-check disabled — 71 false positives on Svelte 5 $state runes.
      # Build step catches real compilation errors. Re-enable when svelte-check
      # supports runes properly.
      # - name: Type check
      #   run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
