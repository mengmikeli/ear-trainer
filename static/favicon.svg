<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Transparent background — works on any tab bar color -->
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#C2FE0C" stroke-width="5" opacity="0.2"/>
  <!-- Primary ring — thick enough to read at 16px -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#C2FE0C" stroke-width="3" opacity="0.9"/>
  <!-- Head dot at 12 o'clock — proportionally larger -->
  <circle cx="32" cy="8" r="4" fill="#C2FE0C"/>
</svg>
